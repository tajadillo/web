    # i3status configuration file.
    # see "man i3status" for documentation.

    # It is important that this file is edited as UTF-8.
    # The following line should contain a sharp s:
    # ß
    # If the above line is not correctly displayed, fix your editor first!

    general {
    colors = true
    color_good = "#008f39"
    color_degraded = "#ffff00"
    color_bad = "#ff0000"

    interval = 1
    }

    order += "tztime local"
    order += "volume master"
    order += "battery all"
    order += "cpu_temperature 0"
    order += "cpu_usage"
    order += "memory"
    #order += "ipv6"
    #order += "ethernet _first_"
    #order += "disk /"
    #order += "load"
    order += "wireless _first_"

    wireless _first_ {
    #format_up = "W: (%quality at %essid) %ip"
    format_up = " . %essid"
    #format_down = "W: down"
    format_down = "No Conectado!!!"
    }

    ethernet _first_ {
    format_up = "E: %ip (%speed)"
    format_down = "E: down"
    separator = true
    separator_block_width = 70
    }

    #battery all {
    #format = "  %status %percentage"
    ##format = "  %status %percentage %remaining"
    ##format = "BAT   %percentage"
    #separator = true
    #separator_block_width = 70
    #}


battery all {
    format = "%status %percentage"
    format_down = "  No battery"
    low_threshold = 15
    threshold_type = percentage
    status_chr = ""
    status_bat = ""
    status_full = "FULL "
    status_unk = ""

    separator = true
    separator_block_width = 70
}

    disk "/" {
    format = "%avail"
    }

    load {
    format = "%1min"
    }

    cpu_usage {
    #format = "(   RAM %used |   %available )"
    #format = "(MEM   %available) "
    format = "CPU:   %usage"
    #threshold_degraded = "1G"
    #format_degraded = "MEMORY < %available"
    separator = true
    separator_block_width = 70
    }




    #memory {
    #format = "RAM: %used / %total (%percentage_used) | Libre: %available"
    #}


memory {
    #format = "RAM: %used / %total (%percentage_used) | Libre: %available"
    format = "RAM:   %percentage_used | Libre: %available"
    threshold_degraded = "1G"
    format_degraded = "RAM BAJA: %available"
    separator = true
    separator_block_width = 70

}

    tztime local {
    #format = "%Y-%m-%d %H:%M:%S"
    format = "  %H:%M:%S"
    separator = true
    separator_block_width = 70
    }

    volume master {
        format = "  : %volume"
        format_muted = "󰖁: muted"
        device = "default"
        mixer = "Master"
        mixer_idx = 0
    separator = true
    separator_block_width = 70
}


cpu_temperature 0 {
    #instalar lm-sensors
    #ejecutar este comando "sudo sensors-detect^C"
    #dar si a todo con la tecla ENTER
    path = "/sys/class/thermal/thermal_zone1/temp"
    format = " %degrees °C "
    separator = true
    separator_block_width = 70
    max_threshold = 70
    color_good = "#00ff00"
    color_degraded = "#ffaa00"
    color_bad = "#ff0000"
}
