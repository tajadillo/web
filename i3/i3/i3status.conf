    # i3status configuration file.
    # see "man i3status" for documentation.

    # It is important that this file is edited as UTF-8.
    # The following line should contain a sharp s:
    # ß
    # If the above line is not correctly displayed, fix your editor first!

    general {
    colors = true
    color_good = "#008f39"
    color_degraded = "#ffff00"
    color_bad = "#ff0000"

    interval = 2
    }

    order += "tztime local"
    order += "volume master"
    order += "battery all"
    order += "memory"
    order += "cpu_temperature 0"
    #order += "ipv6"
    #order += "ethernet _first_"
    #order += "disk /"
    #order += "load"
    order += "wireless _first_"

    wireless _first_ {
    #format_up = "W: (%quality at %essid) %ip"
    format_up = " . %essid"
    #format_down = "W: down"
    format_down = "No Conectado!!!"
    }

    ethernet _first_ {
    format_up = "E: %ip (%speed)"
    format_down = "E: down"
    }

    battery all {
    #format = "%status %percentage %remaining"
    format = "BAT   %percentage"
    color_good = "#00ff00"
    color_degraded = "#ffff00"
    color_bad = "#ff0000"
    }

    disk "/" {
    format = "%avail"
    }

    load {
    format = "%1min"
    }

    memory {
    #format = "(   RAM %used |   %available )"
    format = "(RAM   %available "
    #threshold_degraded = "1G"
    #format_degraded = "MEMORY < %available"
    }

    tztime local {
    #format = "%Y-%m-%d %H:%M:%S"
    format = "  %H:%M:%S"
    }

    volume master {
        format = "  : %volume"
        format_muted = "󰖁: muted"
        device = "default"
        mixer = "Master"
        mixer_idx = 0
}


cpu_temperature 0 {
    path = "/sys/class/thermal/thermal_zone0/temp"
    format = " %degrees °C)"
    max_threshold = 70
    color_good = "#00ff00"
    color_degraded = "#ffaa00"
    color_bad = "#ff0000"
}
